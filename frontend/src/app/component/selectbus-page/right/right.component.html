<div>
  <app-sorting-bar></app-sorting-bar>

  <div *ngFor="let bus of matchedbus">

    <app-bus-box
      [rating]="bus.rating"
      [busid]="bus._id"
      [operatorname]="bus.operatorName"
      [bustype]="bus.busType"
      [departuretime]="bus.departureTime"
      [livetracking]="bus.liveTracking"
      [reschedulable]="bus.reschedulable"
      [selectedseats]="seats[bus._id]"
      [routedetails]="routes">
    </app-bus-box>

  </div>
</div>
